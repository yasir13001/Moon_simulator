<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Simulator Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
      }
      #ui {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 10px;
        border-radius: 8px;
        width: 320px;
      }
      #ui label {
        display: block;
        margin: 6px 0 4px;
        font-size: 12px;
      }
      #ui input,
      #ui select,
      #ui button {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 8px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #111;
        color: #fff;
        padding: 6px;
      }
      #status {
        font-size: 12px;
        color: #8fe3ff;
        min-height: 18px;
      }
      #timelineLabel {
        font-size: 12px;
        color: #b8c7d8;
        margin-top: -4px;
        margin-bottom: 8px;
      }
      #metadata {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 10;
        width: 360px;
        max-height: calc(100vh - 24px);
        overflow: auto;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
      }
      #metadata h3 {
        margin: 0 0 10px;
        font-size: 15px;
      }
      #metadata pre {
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 12px;
        line-height: 1.35;
      }
      .meta-subtitle {
        margin: 0 0 10px;
        color: #a9d8ff;
        font-size: 12px;
      }
      .meta-section {
        margin-bottom: 10px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: rgba(11, 19, 33, 0.75);
      }
      .meta-section-title {
        font-size: 12px;
        color: #8fe3ff;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .meta-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 2px 0;
      }
      .meta-key {
        color: #b8c7d8;
      }
      .meta-value {
        color: #ffffff;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <label for="lat">Latitude</label>
      <input id="lat" type="number" step="0.0001" value="24.8607" />

      <label for="lon">Longitude</label>
      <input id="lon" type="number" step="0.0001" value="67.0011" />

      <label for="speed">Simulation Speed</label>
      <select id="speed">
        <option value="1" selected>Real-time (1x)</option>
        <option value="10">Fast (10x)</option>
        <option value="100">Very fast (100x)</option>
      </select>
      <button id="playPause">Pause</button>
      <button id="jumpNow">Jump To Now</button>

      <label for="timeInput">Set Time (local)</label>
      <input id="timeInput" type="datetime-local" />

      <label for="timeline">Timeline (-24h to +24h from now)</label>
      <input id="timeline" type="range" min="-1440" max="1440" step="1" value="0" />
      <div id="timelineLabel">Now</div>

      <label for="objectSearch">Search Object</label>
      <input
        id="objectSearch"
        type="text"
        placeholder="Type: Moon, Sun, Earth..."
      />
      <button id="searchBtn">Find</button>

      <div style="height: 10px"></div>

      <div style="font-size: 12px; color: #a9d8ff; margin-bottom: 6px">
        ESP8266 Telescope Control
      </div>

      <label for="espTrack">Auto Track (Moon)</label>
      <select id="espTrack">
        <option value="off" selected>Off</option>
        <option value="5">Every 5s</option>
        <option value="10">Every 10s</option>
      </select>

      <label for="espAz">Moon Azimuth (deg)</label>
      <input id="espAz" type="number" step="0.01" readonly />

      <label for="espAlt">Moon Altitude (deg)</label>
      <input id="espAlt" type="number" step="0.01" readonly />

      <button id="espSendBtn">Send Moon to ESP</button>
      <div id="espStatus" style="font-size: 12px; color: #ffcc66; min-height: 18px"></div>

      <button id="espBaselineBtn">Set Tracking Baseline (no move)</button>

      <button id="apply">Apply Location</button>
      <label for="followSelected">Camera</label>
      <select id="followSelected">
        <option value="off" selected>Do not follow selected object</option>
        <option value="on">Follow selected object</option>
      </select>
      <div id="status"></div>
    </div>
    <div id="metadata">
      <h3>Object Metadata</h3>
      <div id="metadataContent" class="meta-subtitle">Click an object (Moon, Sun, Earth, or star) to inspect details.</div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.171.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.171.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
