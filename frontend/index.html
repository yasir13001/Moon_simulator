<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Simulator Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
      }
      #ui {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 10px;
        border-radius: 8px;
        width: 320px;
      }
      #ui label {
        display: block;
        margin: 6px 0 4px;
        font-size: 12px;
      }
      #ui input,
      #ui select,
      #ui button {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 8px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #111;
        color: #fff;
        padding: 6px;
      }
      #status {
        font-size: 12px;
        color: #8fe3ff;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <label for="lat">Latitude</label>
      <input id="lat" type="number" step="0.0001" value="24.8607" />

      <label for="lon">Longitude</label>
      <input id="lon" type="number" step="0.0001" value="67.0011" />

      <label for="speed">Simulation Speed</label>
      <select id="speed">
        <option value="0">Pause</option>
        <option value="1" selected>Real-time (1x)</option>
        <option value="10">Fast (10x)</option>
        <option value="100">Very fast (100x)</option>
      </select>

      <button id="apply">Apply Location</button>
      <div id="status"></div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.171.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.171.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
